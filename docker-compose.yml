version: '3.8'

services:
  # Основний двигун (Python)
  flick-engine:
    build: .
    volumes:
      - .:/app
    environment:
      - SCAN_MODE=full

  # Мережевий сканер (Go)
  flick-go:
    image: golang:1.21-alpine
    volumes:
      - .:/app
    working_dir: /app
    command: go run main.go target_user

  # Документація та Інтерфейс (Static Site)
  flick-docs:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./docs:/usr/share/nginx/html
