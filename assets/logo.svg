<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flick OSINT</title>
    <style>
        /* Центруємо іконку на весь екран */
        body {
            background-color: #0d1117; /* Темний фон GitHub */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Стиль для самої іконки */
        .flick-icon {
            width: 400px; /* Велика іконка */
            height: auto;
            filter: drop-shadow(0 0 15px #00ff00); /* Зелене світіння */
        }

        h1 {
            color: #00ff00;
            font-family: 'Courier New', monospace;
            margin-top: 20px;
            letter-spacing: 10px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- SVG ІКОНКА (ВШИТА ПРЯМО ТУТ) -->
    <svg class="flick-icon" viewBox="0 0 500 500" xmlns="http://www.w3.org">
        <!-- Коло прицілу -->
        <circle cx="250" cy="250" r="200" stroke="#00ff00" stroke-width="4" fill="none" stroke-dasharray="20 10"/>
        <circle cx="250" cy="250" r="100" stroke="#00ff00" stroke-width="1" fill="none" opacity="0.5"/>
        
        <!-- Блискавка (Flick) -->
        <path d="M280 100 L180 270 H250 L220 400 L320 230 H250 L280 100 Z" fill="#00ff00">
            <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite" />
        </path>

        <!-- Лінії прицілу -->
        <line x1="250" y1="20" x2="250" y2="60" stroke="#00ff00" stroke-width="6"/>
        <line x1="250" y1="440" x2="250" y2="480" stroke="#00ff00" stroke-width="6"/>
        <line x1="20" y1="250" x2="60" y2="250" stroke="#00ff00" stroke-width="6"/>
        <line x1="440" y1="250" x2="480" y2="250" stroke="#00ff00" stroke-width="6"/>
    </svg>

    <h1>Flick</h1>

</body>
</html>
