<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Flick OSINT Icon</title>
    <style>
        body {
            background-color: #0d1117; /* Темна тема GitHub */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        /* Сама іконка через код */
        .icon {
            width: 300px;
            height: 300px;
            border: 4px solid #58a6ff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 0 20px #58a6ff;
        }
        .icon::before {
            content: "F";
            color: #58a6ff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 150px;
            font-weight: bold;
        }
        /* Анімація радара */
        .radar {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(88, 166, 255, 0.3);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="icon">
        <div class="radar"></div>
    </div>

</body>
</html>
